version: '3.8'

services:
  diary-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-this}
      - JWT_EXPIRY=7d
    volumes:
      - diary-data:/app/data
    restart: unless-stopped

volumes:
  diary-data:
    driver: local
